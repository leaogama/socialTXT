version: '3.8'

services:
  mcp-social-summary:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-social-summary
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATA_DIR=/app/data
      # Variáveis de autenticação básica para proteger o app (deixe em branco para desativar)
      - APP_USERNAME=${APP_USERNAME:-}
      - APP_PASSWORD=${APP_PASSWORD:-}
      # Variáveis opcionais se preferir configurar direto no Portainer em vez da interface do app:
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_API_URL=${LLM_API_URL:-}
    volumes:
      - socialtxt_data:/app/data
      # Caso precise de cookies para o Instagram, descomente abaixo:
      # - ./cookies.txt:/app/cookies.txt:ro

volumes:
  socialtxt_data:
