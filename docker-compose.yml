version: '3.8'

services:
  mcp-social-summary:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-social-summary
    restart: unless-stopped
    ports:
      # Permite mudar a porta da VPS se a 8001 já estiver sendo usada (ex: APP_PORT=8080)
      - "${APP_PORT:-8001}:8000"
    environment:
      - APP_ENV=production
      - DATA_DIR=/app/data
      # Insira usuário e senha aqui no Portainer para bloquear o acesso público à web e à API
      - APP_USERNAME=${APP_USERNAME:-}
      - APP_PASSWORD=${APP_PASSWORD:-}
      
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_API_URL=${LLM_API_URL:-}
      - WHISPER_MODEL=${WHISPER_MODEL:-tiny}
      # URL do proxy residencial para contornar bloqueios do YouTube (ex: http://user:pass@host:port)
      - PROXY_URL=${PROXY_URL:-}
      # Opção de fallback: usar perfil persistente do navegador para manter cookies
      - USE_BROWSER_PROFILE=${USE_BROWSER_PROFILE:-false}
      - BROWSER_PROFILE_PATH=${BROWSER_PROFILE_PATH:-/app/data/browser-profile}
      # Modo Login Visual na VPS (VNC)
      - ENABLE_VNC_BROWSER=${ENABLE_VNC_BROWSER:-false}
    volumes:
      - socialtxt_data:/app/data
      # Volume compartilhado com o VNC Chrome (Somente Leitura para não corromper o SQLite)
      - youtube_chrome_profile:/app/vnc-profile:ro
  # Serviço VNC Chrome para Login Visual na VPS
  browser-login:
    image: selenium/standalone-chrome:latest
    container_name: socialtxt-browser-login
    restart: unless-stopped
    shm_size: "2g"
    ports:
      - "7900:7900"
    environment:
      - SE_VNC_PASSWORD=socialtxt
    volumes:
      - youtube_chrome_profile:/home/seluser/.config/google-chrome

volumes:
  socialtxt_data:
  youtube_chrome_profile:
